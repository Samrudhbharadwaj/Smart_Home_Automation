<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Home Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:linear-gradient(
        135deg,
        #0f172a,
        #1e3a8a,
        #312e81
    );

    background-size:400% 400%;

    animation:gradientMove 15s ease infinite;

    font-family:'Segoe UI',sans-serif;

}

@keyframes gradientMove{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }

}

.login-card{

    width:420px;

    padding:35px;

    border-radius:25px;

    background:rgba(
        255,
        255,
        255,
        .08
    );

    backdrop-filter:blur(20px);

    border:1px solid rgba(
        255,
        255,
        255,
        .15
    );

    color:white;

    box-shadow:
    0 8px 32px rgba(
        0,
        0,
        0,
        .3
    );

}

.logo{

    font-size:60px;

    text-align:center;

    margin-bottom:10px;

}

.title{

    text-align:center;

    margin-bottom:25px;

}

.form-control{

    background:rgba(
        255,
        255,
        255,
        .1
    );

    border:none;

    color:white;

}

.form-control::placeholder{

    color:#d1d5db;

}

.form-control:focus{

    background:rgba(
        255,
        255,
        255,
        .15
    );

    color:white;

    box-shadow:none;

}

.login-btn{

    width:100%;

    padding:12px;

    border:none;

    border-radius:12px;

    font-weight:bold;

    background:#2563eb;

    color:white;

    transition:.3s;

}

.login-btn:hover{

    transform:translateY(-2px);

    background:#1d4ed8;

}

.eye-btn{

    border:none;

    background:#334155;

    color:white;

}

.footer-text{

    text-align:center;

    margin-top:15px;

    font-size:14px;

    color:#d1d5db;

}

@media(max-width:500px){

    .login-card{

        width:95%;
        padding:25px;
        margin:0 auto;

    }

    h3{
        font-size:1.3rem;
    }

    .login-btn{
        font-size:16px;
        padding:14px;
    }

    .form-control{
        font-size:16px;
        padding:12px;
    }

}

</style>

</head>

<body>

<div class="login-card">

    <div class="logo">
        🏠
    </div>

    <div class="title">

        <h3>Smart Home Automation</h3>

        <small>
            Secure Access Portal
        </small>

    </div>

    <form method="POST">

        <div class="mb-3">

            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Username"
                required
            >

        </div>

        <div class="mb-3">

            <div class="input-group">

                <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-control"
                    placeholder="Password"
                    required
                >

                <button
                    type="button"
                    class="btn eye-btn"
                    onclick="togglePassword()"
                >
                    👁
                </button>

            </div>

        </div>


        <button
            type="submit"
            class="login-btn"
        >
            Login
        </button>

    </form>

    <div class="footer-text">

        Smart Home Dashboard V7.4

    </div>

</div>

<script>

function togglePassword(){

    const password =
    document.getElementById(
        "password"
    );

    password.type =
    password.type === "password"
    ? "text"
    : "password";

}

</script>

</body>
</html>
